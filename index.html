// ============ STATE ============
let currentFilter = 'all';
let currentView = 'card';
let searchQuery = '';

// ============ RENDER ============
function getTypeBadgeClass(type) {
    const map = { '通讯社':'type-通讯社','日报':'type-日报','党报':'type-党报','广播电视':'type-广播电视',
        '广播':'type-广播电视','电视':'type-电视','周刊':'type-周刊','周报':'type-周报',
        '杂志':'type-杂志','门户网站':'type-门户网站','新媒体':'type-新媒体','聚合平台':'type-聚合平台' };
    return map[type] || '';
}

function filterData() {
    let data = MEDIA_DATA;
    if (currentFilter !== 'all') {
        if (currentFilter.startsWith('type-')) {
            const t = currentFilter.replace('type-','');
            data = data.filter(m => {
                if (t === '日报') return m.type === '日报' || m.type === '党报';
                if (t === '广播电视') return ['广播电视','广播','电视'].includes(m.type);
                if (t === '周刊') return ['周刊','周报','杂志'].includes(m.type);
                if (t === '新媒体') return m.type === '新媒体' || m.type === '聚合平台';
                return m.type === t;
            });
        } else {
            data = data.filter(m => m.sub === currentFilter);
        }
    }
    if (searchQuery) {
        const q = searchQuery.toLowerCase();
        data = data.filter(m =>
            m.name.toLowerCase().includes(q) ||
            (m.nameEn && m.nameEn.toLowerCase().includes(q)) ||
            m.type.toLowerCase().includes(q) ||
            m.region.toLowerCase().includes(q) ||
            m.desc.toLowerCase().includes(q)
        );
    }
    return data;
}

function renderCards(data) {
    if (data.length === 0) return '<p style="text-align:center;color:var(--text-tertiary);padding:60px 0;">没有匹配的媒体 🔍</p>';
    return `<div class="card-grid active">${data.map(m => `
        <div class="media-card">
            <div class="card-top">
                <div>
                    <div class="card-name">${m.name}</div>
                    ${m.nameEn ? `<div class="card-name-en">${m.nameEn}</div>` : ''}
                </div>
                <span class="card-type-badge ${getTypeBadgeClass(m.type)}">${m.type}</span>
            </div>
            <div class="card-desc">${m.desc}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
                <a href="${m.url}" target="_blank" rel="noopener" class="card-url">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    ${m.url.replace(/^https?:\/\//,'').replace(/\/$/,'')}
                </a>
                <span style="font-size:0.72rem;color:var(--text-tertiary);">${m.region}</span>
            </div>
        </div>`).join('')}</div>`;
}

function renderTable(data) {
    if (data.length === 0) return '<p style="text-align:center;color:var(--text-tertiary);padding:60px 0;">没有匹配的媒体 🔍</p>';
    return `<div class="table-view active"><table class="data-table">
        <thead><tr><th>媒体名称</th><th>英文名</th><th>类型</th><th>国家/地区</th><th>网址</th></tr></thead>
        <tbody>${data.map(m => `<tr>
            <td style="font-weight:600;">${m.name}</td>
            <td style="color:var(--text-secondary);font-size:0.8rem;">${m.nameEn||''}</td>
            <td><span class="card-type-badge ${getTypeBadgeClass(m.type)}">${m.type}</span></td>
            <td style="color:var(--text-secondary);">${m.region}</td>
            <td><a href="${m.url}" target="_blank" rel="noopener" class="table-link">${m.url.replace(/^https?:\/\//,'').replace(/\/$/,'')}</a></td>
        </tr>`).join('')}</tbody></table></div>`;
}

function render() {
    const data = filterData();
    const main = document.getElementById('mainContent');
    main.innerHTML = currentView === 'card' ? renderCards(data) : renderTable(data);
    // animate cards
    if (currentView === 'card') {
        main.querySelectorAll('.media-card').forEach((c, i) => {
            c.style.opacity = '0';
            c.style.transform = 'translateY(16px)';
            setTimeout(() => {
                c.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                c.style.opacity = '1';
                c.style.transform = 'translateY(0)';
            }, i * 30);
        });
    }
}

// ============ NAV TABS ============
function buildNav() {
    const navTabs = document.getElementById('navTabs');
    const allTabs = [
        ...SECTIONS.map(s => ({key:s.key, label:s.label})),
        {key:'divider', label:'|'},
        ...TYPE_SECTIONS.map(s => ({key:s.key, label:s.label})),
    ];
    navTabs.innerHTML = allTabs.map(t => {
        if (t.key === 'divider') return '<span style="color:var(--text-tertiary);padding:0 8px;user-select:none;">│</span>';
        return `<button class="nav-tab${t.key===currentFilter?' active':''}" data-filter="${t.key}">${t.label}</button>`;
    }).join('');
}

document.getElementById('navTabs').addEventListener('click', e => {
    const tab = e.target.closest('.nav-tab');
    if (!tab) return;
    currentFilter = tab.dataset.filter;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === currentFilter));
    render();
});

// ============ VIEW TOGGLE ============
document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        currentView = btn.dataset.view;
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === currentView));
        render();
    });
});

// ============ SEARCH ============
document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    render();
});

// ============ STATS ============
function updateStats() {
    const total = MEDIA_DATA.length;
    const countries = new Set(MEDIA_DATA.map(m => m.region)).size;
    const types = new Set(MEDIA_DATA.map(m => m.type)).size;
    animateNumber('stat-total', total);
    animateNumber('stat-countries', countries);
    animateNumber('stat-types', types);
}
function animateNumber(id, target) {
    const el = document.getElementById(id);
    let current = 0;
    const step = Math.max(1, Math.floor(target / 30));
    const interval = setInterval(() => {
        current += step;
        if (current >= target) { current = target; clearInterval(interval); }
        el.textContent = current;
    }, 30);
}

// ============ INIT ============
buildNav();
render();
updateStats();
</script>
